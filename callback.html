<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YanProperty - OAuth Callback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#f5f5f5;font-family:sans-serif;">
<div style="background:#fff;padding:2rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);max-width:600px;text-align:center;">
    <h1 style="color:#333;">âœ… Authorisasi TikTok</h1>
    <div id="status">Memproses...</div>
    <pre id="codeDisplay" style="background:#f0f0f0;padding:1rem;border-radius:8px;word-break:break-all;margin-top:1rem;display:none;"></pre>
    <p id="errorDisplay" style="color:#d32f2f;display:none;margin-top:1rem;"></p>
</div>
<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const statusEl = document.getElementById('status');
    const codeDisplay = document.getElementById('codeDisplay');
    const errorDisplay = document.getElementById('errorDisplay');

    if (error) {
        statusEl.textContent = 'âŒ Authorisasi ditolak atau gagal.';
        errorDisplay.textContent = 'Error: ' + error;
        errorDisplay.style.display = 'block';
        return;
    }

    if (code) {
        statusEl.textContent = 'âœ… Berhasil! Copy kode di bawah dan kirim ke Freeman:';
        codeDisplay.textContent = code;
        codeDisplay.style.display = 'block';
        
        // Auto-copy
        navigator.clipboard.writeText(code).then(() => {
            let copyMsg = document.createElement('p');
            copyMsg.textContent = 'ðŸ“‹ Code sudah di-copy otomatis ke clipboard!';
            copyMsg.style.color = '#4CAF50';
            copyMsg.style.marginTop = '1rem';
            codeDisplay.parentNode.appendChild(copyMsg);
        }).catch(() => {});
    } else {
        statusEl.textContent = 'â³ Tidak ada kode ditemukan. Coba lagi dari awal.';
    }
})();
</script>
</body>
</html>
